server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # REQUIRED STRUCTURE FOR SPRING BOOT 4.X / SPRING CLOUD 5.X
      server:
        webflux:
          routes:
            # ---------------------------------------------------
            # 1. ROUTE FOR USER SERVICE
            # ---------------------------------------------------
            - id: user-service
              # Load balance traffic to instances registered in Eureka
              uri: lb://USER-SERVICE
              predicates:
                # Match any request starting with /api/users/
                - Path=/api/users/**
              filters:
                # Apply the AuthenticationGatewayFilterFactory to secure this route
                - Authentication

            # ---------------------------------------------------
            # 2. ROUTE FOR COURSE SERVICE
            # ---------------------------------------------------
            - id: course-service
              uri: lb://COURSE-SERVICE
              predicates:
                - Path=/api/courses/**
              filters:
                - Authentication